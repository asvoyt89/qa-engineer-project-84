---
- summary: |
    Uncaught TypeError при загрузке главной страницы (ошибка в скрипте отображения баннера)
  environment: |
    URL: https://products-store-ru.hexlet.app
    Browser: Google Chrome 120.0.0 (Официальная сборка) (64 бит)
    OS: Windows 10 Pro
    Date: 2025-12-17
  steps-to-reproduce: |
    1. Открыть главную страницу: https://products-store-ru.hexlet.app
    2. Дождаться полной загрузки страницы
    3. Открыть DevTools → Console
    4. Обратить внимание на появившиеся ошибки
  expected-result: |
    При загрузке главной страницы в консоли нет ошибок уровня Error/Uncaught Exception; баннер/слайдер отображается корректно.
  actual-result: |
    В консоли появляется ошибка: "Uncaught TypeError: Cannot read property 'map' of undefined" (примерно в main.bundle.js:12345).
    Вследствие ошибки баннер не отрисовывается (пустое место вверху страницы).

- summary: |
    При добавлении товара в корзину счётчик не увеличивается и товар не отображается в корзине
  environment: |
    URL: https://products-store-ru.hexlet.app
    Browser: Mozilla Firefox 124.0 (64-bit)
    OS: macOS Sonoma 14.0
    Date: 2025-12-17
  steps-to-reproduce: |
    1. Открыть каталог товаров
    2. Выбрать любую карточку товара или нажать "Добавить в корзину" прямо в карточке
    3. Обратить внимание на счётчик корзины в шапке
    4. Перейти на страницу корзины
  expected-result: |
    Счётчик корзины в шапке увеличивается на 1;
    выбранный товар отображается на странице корзины с корректной ценой и количеством.
  actual-result: |
    Счётчик корзины остаётся без изменений;
    на странице корзины товар отсутствует;
    в Network видно XHR-запрос на /api/cart, который возвращает 200, но в теле ответа пустой массив (возможная ошибка на сервере или некорректная обработка ответа на клиенте).

- summary: |
    При попытке зарегистрировать нового пользователя форма возвращает 500 Internal Server Error
  environment: |
    URL: https://products-store-ru.hexlet.app (вторая версия)
    Browser: Google Chrome 120.0.0
    OS: Ubuntu 22.04
    Date: 2025-12-17
  steps-to-reproduce: |
    1. Открыть страницу регистрации
    2. Заполнить поля валидными данными:
       - Логин: testuser2025
       - Email: testuser2025@example.com
       - Пароль: SecurePass1
    3. Нажать кнопку "Зарегистрироваться"
    4. Открыть DevTools → Network и посмотреть ответ на запрос регистрации (POST /api/users or similar)
  expected-result: |
    Сервер возвращает 201 Created или 200 OK; пользователь получает подтверждение/редирект и автоматически авторизуется.
  actual-result: |
    Запрос регистрации возвращает 500 Internal Server Error; на странице отображается общее сообщение об ошибке без подробностей.
    В консоли Network виден ответ с телом сервера, содержащим stack trace или сообщение об ошибке (указывает на проблему на бэкенде при создании пользователя).

- summary: |
    Некоторые изображения товаров не загружаются — возвращается 404, вместо плейсхолдера показывается битый значок
  environment: |
    URL: https://products-store-ru.hexlet.app
    Browser: Microsoft Edge 120.0.0
    OS: Windows 11
    Date: 2025-12-17
  steps-to-reproduce: |
    1. Открыть страницу каталога товаров
    2. Прокрутить список товаров и просмотреть загрузку изображений
    3. В DevTools → Network отфильтровать по Images и найти ответы со статусом 404
  expected-result: |
    Для некорректных/отсутствующих изображений показывается плейсхолдер (alt-изображение) или корректный fallback, приложение не показывает "битые" иконки.
  actual-result: |
    Некоторым изображениям возвращается 404 Not Found;
    на месте изображения отображается стандартный битый значок изображения браузера (нет кастомного плейсхолдера);
    в консоли появляются ошибки загрузки ресурса.

- summary: |
    Процесс оформления заказа зависает на шаге подтверждения (индикатор загрузки не исчезает)
  environment: |
    URL: https://products-store-ru.hexlet.app
    Browser: Google Chrome 120.0.0
    OS: Ubuntu 22.04
    Date: 2025-12-17
  steps-to-reproduce: |
    1. Авторизоваться под тестовым пользователем
    2. Добавить товар(ы) в корзину
    3. Перейти в корзину → нажать "Оформить заказ"
    4. Заполнить требуемые поля доставки/оплаты и подтвердить заказ
    5. Наблюдать поведение после отправки формы (spinner/loader)
  expected-result: |
    После отправки заказа пользователь видит страницу подтверждения с номером заказа; loader исчезает; в ответе API — 201/200 с данными заказа.
  actual-result: |
    После подтверждения отображается бесконечный индикатор загрузки (spinner);
    в Network виден POST /api/orders, который либо не отправляется, либо возвращает 500/504/пустой ответ;
    пользователь не получает подтверждения и не понимает, завершён ли заказ.
