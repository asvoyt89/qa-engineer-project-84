---
- summary: |
    Загрузка главной страницы и корректность сетевых ресурсов
  requirement: |
    Все необходимые ресурсы страницы (HTML/CSS/JS/изображения и API-запросы) должны загружаться без ошибок.
  prerequisites: |
    Открыта главная страница приложения
  test-data: |
    Нет
  steps:
    - Открыть главную страницу
    - Открыть DevTools → Network и перезагрузить страницу
  expected-result: |
    Нет запросов с 4xx/5xx/Failed для основных ресурсов, статусы ответов для статических ресурсов 200/304, ключевые API-запросы возвращают ожидаемые коды (200/201).

- summary: |
    Отсутствие ошибок выполнения скриптов в консоли при загрузке страницы
  requirement: |
    На странице не должно быть uncaught ошибок JavaScript при загрузке и базовых взаимодействиях.
  prerequisites: |
    Открыта проверяемая страница (главная/каталог/страница товара)
  test-data: |
    Нет
  steps:
    - Открыть страницу
    - Открыть DevTools → Console и выполнить несколько переходов между страницами
  expected-result: |
    В консоли отсутствуют ошибки уровня Error/Uncaught Exception; предупреждения (Warning) при необходимости фиксируются отдельно.
    
- summary: |
    Открытие страницы товара и отображение деталей
  requirement: |
    На странице товара должны отображаться название, изображение, цена и описание.
  prerequisites: |
    В каталоге присутствует как минимум один товар
  test-data: |
    Выбрать любую карточку товара в каталоге
  steps:
    - Нажать на товар или кнопку "Подробнее"
  expected-result: |
    Открывается страница товара с названием, ценой, описанием, изображением; отсутствуют визуальные артефакты и ошибки в консоли для этой страницы.

- summary: |
    Добавление товара в корзину
  requirement: |
    При добавлении товара корзина должна обновляться — товар появляется в корзине и счётчик/итог цены меняется.
  prerequisites: |
    Открыта страница товара или каталога
    Корзина пуста или известно начальное состояние
  test-data: |
    Выбрать товар X
  steps:
    - Нажать "Добавить в корзину" для товара X
    - Открыть страницу корзины
  expected-result: |
    Товар X появляется в списке корзины, счётчик в шапке увеличился, итоговая сумма рассчитывается корректно,
    соответствующий запрос к API вернул 200/201.
    
- summary: |
    Удаление товара из корзины
  requirement: |
    Удаление товара должно удалять его из списка корзины и корректно обновлять итог.
  prerequisites: |
    В корзине присутствует как минимум один товар
  test-data: |
    Товар X в корзине
  steps:
    - Нажать кнопку "Удалить" рядом с товаром X
  expected-result: |
    Товар X исчезает из корзины, итоговая сумма обновляется, в API возвращается подтверждение удаления (например, 200/204).

- summary: |
    Выход пользователя (logout)
  requirement: |
    При выходе доступ к защищённым страницам должен быть запрещён, сессия удалена.
  prerequisites: |
    Пользователь авторизован
  test-data: |
    Нет
  steps:
    - Нажать "Выйти" / "Logout"
    - Попробовать перейти на защищённую страницу (личный кабинет)
  expected-result: |
    Пользователь перенаправляется на страницу входа/главную, в localStorage/cookie отсутствует sessionId/токен,
    доступ к защищённым страницам возвращает 401/перенаправление на вход.

- summary: |
    Респонсивность ключевых страниц на мобильных разрешениях
  requirement: |
    Ключевые страницы (главная, каталог, страница товара, корзина) должны отображаться корректно и быть функциональны на мобильных ширинах.
  prerequisites: |
    Открыт браузер с DevTools
  test-data: |
    Эмуляция устройства: ширина 375px (iPhone) и 768px (tablet)
  steps:
    - Включить эмуляцию устройств в DevTools
    - Проверить главную, каталог, страницу товара и корзину
  expected-result: |
    Элементы интерфейса не накладываются, кнопки доступны для нажатия, функционал (добавление в корзину, переходы) работает на мобильных разрешениях.

- summary: |
    Проверка загрузки изображений товаров
  requirement: |
    Изображения товаров должны корректно загружаться и заменяться плейсхолдером при ошибке загрузки.
  prerequisites: |
    На строке поиска показывает товар который ищят 
  test-data: |
    Нет
  steps:
  - Открыть страницу каталога.
  -  Ввести в строку поиска существующий товар (например, "Туфли").
  expected-result: |
    В результатах отображаются товары, содержащие введенное слово.
